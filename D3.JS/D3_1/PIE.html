<!DOCTYPE html>
<html>
<head>
<script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<script>
const data = [55, 22, 37]; // Data Samples For Pie Data

const width = 300; // Width  
const height = 300;
const radius = Math.min(width, height) / 2; // Radius

// SVG Container Box
const svg = d3.select("body") 
  .append("svg")  
  .attr("width", width)
  .attr("height", height)
  .append("g")
  .attr("transform", `translate(${width/2}, ${height/2})`); // translate(${width/2}, ${height/2}) -> it moves the center of the pie chart to the middle of the SVG container 

const color = d3.scaleOrdinal(d3.schemeCategory10); // 

const pie = d3.pie()(data); // d3.pie() -> It is function that takes an array of data and returns an array of objects, where each object represents a slice of the pie chart. 

const arc = d3.arc() // It is a function that generates the path data for an arc, which is used to create the slices of the pie chart.
  .innerRadius(0)
  .outerRadius(radius);

svg.selectAll("path") // selectAll("path") -> It selects all the path elements in the SVG container. Since there are no path elements yet, it returns an empty selection.
  .data(pie)
  .enter()
  .append("path")
  .attr("d", arc)
  .attr("fill", (d, i) => color(i));

</script>

</body>
</html>
