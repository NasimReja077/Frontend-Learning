<!DOCTYPE html>
<html>
<head>
<script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<script>
const data = [10, 20, 15, 30, 25];

const width = 400;
const height = 300;

const svg = d3.select("body")
  .append("svg")
  .attr("width", width)
  .attr("height", height);

const xScale = d3.scaleLinear() // d3.scaleLinear() -> It is a function that creates a linear scale, which is used to map the input data to the output range.
  .domain([0, data.length - 1])
  .range([0, width]);

const yScale = d3.scaleLinear() 
  .domain([0, d3.max(data)])
  .range([height, 0]);

const line = d3.line() // d3.line() -> It is a function that generates the path data for a line, which is used to create the line chart.
  .x((d, i) => xScale(i))
  .y(d => yScale(d));

svg.append("path")
  .datum(data)
  .attr("fill", "none")
  .attr("stroke", "red")
  .attr("stroke-width", 2)
  .attr("d", line);

</script>

</body>
</html>
