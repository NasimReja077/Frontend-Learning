<!DOCTYPE html>
<html>
<head>
<script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<script>
const data = [10, 20, 30, 40];

const width = 400;
const height = 300;

const svg = d3.select("body")
  .append("svg")
  .attr("width", width)
  .attr("height", height);

  // Create Bars
  // selectAll("rect") -> It selects all the rect elements in the SVG container. Since there are no rect elements yet, it returns an empty selection.
svg.selectAll("rect")
  .data(data)
  .enter()
  .append("rect")
  .attr("x", (d, i) => i * 50)
  .attr("y", d => height - d * 5)
  .attr("width", 40)
  .attr("height", d => d * 5)
  .attr("fill", "blue");

</script>

</body>
</html>
